<!DOCTYPE html>
<html lang="eng">

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Layout</title>
    <link rel="stylesheet" href="styles.css"> 
</head>

<body>
    <header>
        <h1>Fixed Layout Example</h1>
    </header>

    <main>
        <div class="fixed-container">
            <h2>Main Content</h2>
            <p>This container has a fixed width and will not change regardless of the window size.</p>
        </div>
    </main>

    <footer>
        <p>Footer Content</p>
    </footer>
</body>
</html>
