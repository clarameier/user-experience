<!--
    layout é a forma como os elementos são organizados e dispostos em uma página ou tela.
    é como se você estivesse arrumando objetos em uma mesa de forma que tudo ficasse bonito e fácil de encontrar.
-->

<!DOCTYPE html>
<html lang="pt-BR">

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Examples</title>
    <link rel="stylesheet" href="styles.css"> <!-- link para o arquivo CSS externo -->
</head>

<body>
    <header>
        <h1>Layout Examples</h1>
    </header>
    <section class="grid-layout">
        <h2>Grid Layout</h2>
        <div class="grid-container">
            <div class="grid-item">Item 1</div>
            <div class="grid-item">Item 2</div>
            <div class="grid-item">Item 3</div>
            <div class="grid-item">Item 4</div>
        </div>
    </section>
    <section class="flex-layout">
        <h2>Flexbox Layout</h2>
        <div class="flex-container">
            <div class="flex-item">Item 1</div>
            <div class="flex-item">Item 2</div>
            <div class="flex-item">Item 3</div>
            <div class="flex-item">Item 4</div>
        </div>
    </section>
    <section class="float-layout">
        <h2>Float Layout</h2>
        <div class="float-container">
            <div class="float-item">Item 1</div>
            <div class="float-item">Item 2</div>
            <div class="float-item">Item 3</div>
            <div class="float-item">Item 4</div>
        </div>
    </section>
</body>
</html>
