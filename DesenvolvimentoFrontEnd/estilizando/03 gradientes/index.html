<!DOCTYPE html>
<html lang="eng">

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylized Gradients</title>
    <link rel="stylesheet" href="styles.css"> <!-- link para o arquivo CSS externo -->
</head>
 
<body>
    <div class="container">

        <div class="gradient-example linear-gradient">
            <p>Linear Gradient</p> <!-- Gradiente Linear -->
        </div>

        <div class="gradient-example radial-gradient">
            <p>Radial Gradient</p> <!-- Gradiente Radial -->
        </div>

        <div class="gradient-example conic-gradient">
            <p>Conic Gradient</p> <!-- Gradiente Cônico -->
        </div>

        <div class="gradient-example diagonal-gradient">
            <p>Diagonal Gradient</p> <!-- Gradiente Diagonal -->
        </div>
        
        <div class="gradient-example text-gradient">
            <p>Text Gradient</p> <!-- Gradiente no Texto -->
        </div>

    </div>
</body>
</html>
