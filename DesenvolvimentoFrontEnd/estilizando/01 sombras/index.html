<!DOCTYPE html>
<html lang="eng">

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows Styles</title>
    <link rel="stylesheet" href="styles.css"> <!-- link para o arquivo CSS externo -->
</head>

<body>
    <div class="container">

        <div class="shadow-example simple-shadow">
            <p>Simple Shadow</p> <!-- simples -->
        </div>

        <div class="shadow-example spread-shadow">
            <p>Spread Shadow</p> <!-- expandida -->
        </div>

        <div class="shadow-example inset-shadow">
            <p>Inset Shadow</p> <!-- interna -->
        </div>

        <div class="shadow-example blur-shadow">
            <p>Blur Shadow</p> <!-- desfocada -->
        </div>

        <div class="shadow-example color-shadow">
            <p>Color Shadow</p> <!-- colorida -->
        </div>

        <div class="shadow-example multiple-shadows">
            <p>Multiple Shadows</p> <!-- múltiplas -->
        </div>

        <div class="shadow-example bottom-right-shadow">
            <p>Bottom Right Shadow</p> <!-- canto inferior direito -->
        </div>

        <div class="shadow-example top-left-shadow">
            <p>Top Left Shadow</p> <!-- canto superior esquerdo -->
        </div>

    </div>
</body>
</html>
