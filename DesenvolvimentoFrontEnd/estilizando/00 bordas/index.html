<!DOCTYPE html>
<html lang="eng">

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Styles</title>
    <link rel="stylesheet" href="styles.css"> <!-- link para o arquivo CSS externo -->
</head>

<body>
    <div class="container">

        <div class="border-example solid-border">
            <p>Solid Border</p> <!-- sólida -->
        </div>

        <div class="border-example dotted-border">
            <p>Dotted Border</p> <!-- pontilhada -->
        </div>

        <div class="border-example dashed-border">
            <p>Dashed Border</p> <!-- tracejada -->
        </div>

        <div class="border-example double-border">
            <p>Double Border</p> <!-- dupla -->
        </div>

        <div class="border-example groove-border">
            <p>Groove Border</p> <!-- relevo -->
        </div>

        <div class="border-example ridge-border">
            <p>Ridge Border</p> <!-- crista -->
        </div>

        <div class="border-example inset-border">
            <p>Inset Border</p> <!-- embutida -->
        </div>

        <div class="border-example outset-border">
            <p>Outset Border</p> <!-- saliente -->
        </div>

        <div class="border-example rounded-border">
            <p>Rounded Border</p> <!-- arredondada -->
        </div>

        <div class="border-example complex-border">
            <p>Complex Border</p> <!-- complexa -->
        </div>

    </div>
</body>
</html>
