<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Exemplo de Alinhamento de Fontes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <div class="align-example align-left">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Alinhado à Esquerda</p>
        </div>

        <div class="align-example align-center">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Centralizado</p>
        </div>

        <div class="align-example align-right">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Alinhado à Direita</p>
        </div>

        <div class="align-example align-justify">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Justificado: Olá, este é um exemplo de um mini-texto para vermos como ele fica de forma jutificada.</p>
        </div>

        <div class="align-example align-top">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Alinhado ao Topo</p>
        </div>

        <div class="align-example align-middle">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Alinhado ao Meio</p>
        </div>

        <div class="align-example align-bottom">
            <!-- exemplo  de fonte padrão -->
            <p>Texto Alinhado ao Fundo</p>
        </div>

    </div>
</body>

</html>
