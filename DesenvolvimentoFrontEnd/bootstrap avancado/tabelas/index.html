<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Tabelas com Bootstrap</title>
    <!-- inclui o css do bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- inclui o arquivo css personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="text-center my-4">
            <h1>Exemplo de Tabelas com Bootstrap</h1>
        </header>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Joana Silva</td>
                    <td>joana.silva@exemple.com</td>
                    <td>(11) 1234-5678</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Maria Souza</td>
                    <td>maria.souza@exemple.com</td>
                    <td>(21) 8765-4321</td>
                </tr>
            
                <tr>
                    <td>3</td>
                    <td>Pietra Oliveira</td>
                    <td>pietra.oliveira@exemple.com</td>
                    <td>(31) 9999-4001</td>
                </tr>
            </tbody>
        </table>
    </div>

    
    <footer class="text-center mt-4">
        <p>&copy; 2026 Exemplo de Tabelas</p>
    </footer>

    <!-- inclui o javascript do bootstrap e dependências -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
