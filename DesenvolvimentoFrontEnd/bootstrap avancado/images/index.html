<!--
    LINK: https://getbootstrap.com/docs/5.3/content/images/#responsive-images
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Imagens com Bootstrap</title>
    <!-- inclui o css do bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- inclui o arquivo css personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="text-center my-4">
            <h1>Exemplo de Imagens com Bootstrap</h1>
        </header>
    </div>

    <div class="row">
        <div class="col-md-4 col-sm-12 mb-4">
            <img src="https://image-placeholder.com/images/actual-size/200x200.png" class="img-fluid rounded-circle" alt="Imagem Redonda">
            <p class="text-center">Imagem Redonda</p>
        </div>

        <div class="col-md-4 col-sm-12 mb-4">
            <img src="https://image-placeholder.com/images/actual-size/200x200.png" class="img-thumbnail" alt="Imagem Miniatura">
            <p class="text-center">Imagem Miniatura</p>
        </div>

        <div class="col-md-4 col-sm-12 mb-4">
            <img src="https://image-placeholder.com/images/actual-size/200x200.png" class="img-fluid rounded" alt="Imagem com Bordas Arredondadas">
            <p class="text-center">Imagem com Bordas Arredondadas</p>
        </div>
    </div>

    <footer class="text-center mt-4">
        <p>&copy; 2026 Exemplo de Imagens</p>
    </footer>

    <!-- inclui o javascript do bootstrap e dependências -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
