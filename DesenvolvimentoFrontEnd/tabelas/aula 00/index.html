<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Exemplo de Tabelas Thead, Tbody e Tfoot</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <table> <!-- cria uma tabela -->

            <thead> <!-- cabeçalho da tabela -->
                <tr> <!-- linha do cabeçalho -->
                    <th>Produto</th> <!-- cabeçalho da coluna -->
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody> <!-- corpo da tabela -->
                <tr> <!-- linha do cabeçalho -->
                    <td>Produto 1</td> <!-- dados da tabela -->
                    <td>R$10,00</td>
                    <td>2</td>
                    <td>R$20,00</td>
                </tr>

                <tr> <!-- linha do cabeçalho -->
                    <td>Produto 2</td> <!-- dados da tabela -->
                    <td>R$15,00</td>
                    <td>3</td>
                    <td>R$45,00</td>
                </tr>

                <tr> <!-- linha do cabeçalho -->
                    <td>Produto 3</td> <!-- dados da tabela -->
                    <td>R$7,00</td>
                    <td>5</td>
                    <td>R$35,00</td>
                </tr>
            </tbody>

            <tfoot> <!-- rodapê da tabela -->
                <tr> <!-- linha do rodapé -->
                    <td colspan="3">Total</td> <!-- daods da tabela com mesclagem de 3 colunas -->
                    <td>R$100,00</td>
                </tr>
            </tfoot>

        </table>
    </div>
</body>

</html>
