<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Exemplo de Tabela com Atributos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Exemplo de Tabela com Atributos</h1>

        <table class="minha-tabela"> <!-- cria uma tabela -->
            <tr>
                <th colspan="3">Informações Pessoais</th>
            </tr>

            <tr>
                <th rowspan="2">Nome</th> <!-- célula que se estende por 2 linhas -->
                <th>Idade</th>
                <th>Cidade</th>
            </tr>

            <tr>
                <td>25</td>
                <td>São Paulo</td>
            </tr>

            <tr>
                <td>Carlos</td>
                <td>30</td>
                <td>Rio de Janeiro</td>
            </tr>

            <tr>
                <td>Maria</td>
                <td>22</td>
                <td>Belo Horizonte</td>
            </tr>
        </table>
</body>

</html>
