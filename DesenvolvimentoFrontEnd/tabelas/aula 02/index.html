<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Exemplo de Tabela com Atributos e Propriedades</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Exemplo de Tabela com Atributos e Propriedades</h1>

        <table class="minha-tabela" border="1" cellpadding="10" cellspacing="5"> <!-- cria uma tabela -->
            <tr>
                <th colspan="2">Informações Pessoais</th>
            </tr>

            <tr>
                <th>Nome</th>
                <th>Idade</th>
            </tr>

            <tr>
                <td>Ana</td>
                <td>25</td>
            </tr>

            <tr>
                <td>Carlos</td>
                <td>30</td>
            </tr>

        </table>
</body>

</html>
