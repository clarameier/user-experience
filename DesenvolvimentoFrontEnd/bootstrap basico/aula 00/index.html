<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Introdução ao Bootstrap</title>
    <!-- link para o css do bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- link para o arquivo css personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1 class="text-center">Bem-vindo ao Bootstrap</h1>

        <div class="row">
            <div class="col-md-6">
                <p>Bootstrap é uma biblioteca front-end que facilita a criação de layouts responsivos e modernos.</p>
            </div>

            <div class="col-md-6">
                <p>Com Bootstrap, você pode rapidamente criar um site que funciona bem em dispositivos móveis e desktops.</p>
            </div>
        </div>

        <div class="text-center">
            <button class="btn btn-primary">Clique Aqui</button>
        </div>
        

        <!-- link para o javascript do bootstrap e suas dependências -->
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    </div>
</body>
</html>
