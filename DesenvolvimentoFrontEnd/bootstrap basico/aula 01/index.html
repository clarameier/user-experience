<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Grid do Bootstrap</title>
    <!-- inclui o css do bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- inclui o arquivo css personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="text-center my-4">Exemplo de Grid do Bootstrap</h1>
        <div class="row">
            <!-- coluna que ocupa 4 colunas em telas pequenas, 6 colunas em telas médias e 4 colunas em telas grandes -->
            <div class="col-sm-4 col-md-6 col-lg-4 box">Coluna 1</div>
            <!-- coluna que ocupa 4 colunas em telas pequenas, 6 colunas em telas médias e 4 colunas em telas grandes -->
            <div class="col-sm-4 col-md-6 col-lg-4 box">Coluna 2</div>
            <!-- voluna que ocupa 4 colunas em telas pequenas, 12 colunas em telas médias e 4 colunas em telas grandes -->
            <div class="col-sm-4 col-md-12 col-lg-4 box">Coluna 3</div>
        </div>
    </div>

    <!-- inclui o javascript do bootstrap e suas dependências -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
