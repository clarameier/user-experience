<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devide-width, initial-scale=1.0">
    <title>Exemplo de Input e Textarea</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Formulário de Contato</h1>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o seu nome">

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite o seu e-mail">

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="4" placeholder="Digite a sua mensagem"></textarea>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
